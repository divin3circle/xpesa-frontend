[profile.default]
src = "src"
test = "test"
script = "script"
out = "out"
libs = ["lib"]
cache_path = "cache"
solc = "0.8.24"
evm_version = "shanghai"
optimizer = true
optimizer_runs = 200
via_ir = false
fs_permissions = [{ access = "read-write", path = "./deployments" }]

[fmt]
line_length = 100
tab_width = 4
bracket_spacing = true

[rpc_endpoints]
fuji = "${FUJI_RPC_URL}"
avalanche = "${AVALANCHE_RPC_URL}"

[invariant]
runs = 32
depth = 128
